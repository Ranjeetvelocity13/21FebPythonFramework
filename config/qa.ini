# =========================================================
# QA Environment Configuration
# =========================================================

[environment]
env = qa
base_url = https://demoblaze.com/
username = testuser
password = testpass

[browser]
browser_name = chrome

headless = false

implicit_wait = 10

explicit_wait = 15

page_load_timeout = 30


[execution]

timeout = 60

retries = 1

workers = 3

parallel = false


[reporting]

screenshot = on_failure

log_level = INFO