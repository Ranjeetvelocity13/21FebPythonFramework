# =========================================================
# pytest.ini
# Enterprise Selenium Python Framework
# =========================================================

[pytest]

# =========================================================
# TEST DISCOVERY
# =========================================================

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# =========================================================
# MARKERS
# =========================================================

markers =
    smoke: Smoke test cases - quick validation
    regression: Regression test cases - full coverage
    sanity: Sanity test cases - critical path
    e2e: End-to-End workflow tests
    login: Login module tests
    product: Product module tests
    cart: Cart module tests
    checkout: Checkout module tests
    contact: Contact module tests


# =========================================================
# CUSTOM COMMAND LINE OPTIONS
# =========================================================

addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --alluredir=allure-results


# =========================================================
# LOGGING CONFIGURATION
# =========================================================

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S


# =========================================================
# TIMEOUT
# =========================================================

timeout = 60